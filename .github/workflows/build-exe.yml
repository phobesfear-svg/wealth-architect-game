name: Build Windows EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unpack Project Files
        run: |
          # Finds your master zip file and unpacks it into the cloud environment
          Expand-Archive -Path *.zip -DestinationPath . -Force
          Remove-Item *.zip -ErrorAction SilentlyContinue

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Desktop Application
        run: |
          npm install
          npm install --save-dev electron electron-builder
          
          # Creates the basic desktop window script automatically
          echo "const { app, BrowserWindow } = require('electron'); const path = require('path'); function createWindow() { const win = new BrowserWindow({ width: 1280, height: 720, autoHideMenuBar: true, webPreferences: { contextIsolation: true } }); win.loadFile(path.join(__dirname, 'out', 'index.html')); } app.whenReady().then(createWindow);" > main.js
          
          # Configures the package settings dynamically for building
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.main = 'main.js'; pkg.build = { appId: 'com.moneygame.wealth', files: ['out/**/*', 'main.js', 'package.json'] }; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # Compiles the Next.js code and wraps it inside the EXE wrapper
          npx next build
          npx electron-builder --win portable
          
      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Money-Game-Windows-Executable
          path: dist/*.exe
