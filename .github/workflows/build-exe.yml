name: Build Windows EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unpack Project Files
        run: |
          Expand-Archive -Path *.zip -DestinationPath . -Force
          Remove-Item *.zip -ErrorAction SilentlyContinue

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Patch Configuration for Static Export
        run: |
          # This automatically overwrites and creates a clean next.config.js for static desktop compilation
          echo "/** @type {import('next').NextConfig} */ const nextConfig = { output: 'export', images: { unoptimized: true }, typescript: { ignoreBuildErrors: true }, eslint: { ignoreDuringBuilds: true } }; module.exports = nextConfig;" > next.config.js
          
          # Removes any conflicting next.config.ts file that might override our static rules
          if (Test-Path next.config.ts) { Remove-Item next.config.ts -Force }

      - name: Build Desktop Application
        run: |
          # Install development dependencies cleanly
          npm install --legacy-peer-deps
          npm install --save-dev electron electron-builder
          
          # Inject basic desktop application window configuration
          echo "const { app, BrowserWindow } = require('electron'); const path = require('path'); function createWindow() { const win = new BrowserWindow({ width: 1280, height: 720, autoHideMenuBar: true, webPreferences: { contextIsolation: true } }); win.loadFile(path.join(__dirname, 'out', 'index.html')); } app.whenReady().then(createWindow);" > main.js
          
          # Modify package.json settings dynamically for building
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json')); pkg.main = 'main.js'; pkg.build = { appId: 'com.moneygame.wealth', files: ['out/**/*', 'main.js', 'package.json'] }; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          
          # Compile the Next.js app and build the portable standalone EXE
          npx next build
          npx electron-builder --win portable
          
      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: Money-Game-Windows-Executable
          path: dist/*.exe
